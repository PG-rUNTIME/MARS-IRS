services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ir_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DB_NAME: ir_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      # Edit host/IP list when you change deployment (comma-separated, no spaces)
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,10.169.39.56
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8001,http://127.0.0.1:8001,http://10.169.39.56:5174,http://10.169.39.56:8001
      FRONTEND_BASE_URL: http://10.169.39.56:5174
      REQUISITION_EMAIL_SYSTEM_NAME: MARS Internal Requisition System
    volumes:
      - pg_backups:/backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
          # Empty = use relative /api/ so nginx proxies to backend (same origin, no CORS)
          VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pg_backups:
  pgadmin_data:
