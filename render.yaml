databases:
  - name: mars-irs-db
    databaseName: ir_db
    user: ir_user
    plan: free

services:
  - type: web
    name: mars-irs-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mars-irs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: mars-irs-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mars-irs.onrender.com

  - type: web
    name: mars-irs
    runtime: static
    staticPublishPath: dist
    buildCommand: npm install && npm run build
    envVars:
      - key: VITE_API_BASE
        value: https://mars-irs-api.onrender.com
